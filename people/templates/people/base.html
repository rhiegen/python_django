<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Person Management</title>
    <style>
      :root { --bg: #001f3f; --fg: #ffffff; --accent: #1e90ff; }
      html, body { height: 100%; }
      body {
        margin: 0; padding: 0; background: var(--bg); color: var(--fg);
        font-family: Arial, Helvetica, sans-serif;
      }
      a { color: var(--fg); }
      a.button, button, input[type="submit"] {
        display: inline-block; padding: 10px 16px; border: 1px solid var(--fg);
        color: var(--fg); background: transparent; border-radius: 6px;
        text-decoration: none; cursor: pointer;
      }
      a.button:hover, button:hover, input[type="submit"]:hover { background: rgba(255,255,255,0.1); }
      .container { max-width: 900px; margin: 0 auto; padding: 24px; }
      header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      h1, h2, h3 { margin: 0 0 12px; font-weight: 600; }
      form.inline { display: flex; gap: 8px; align-items: center; }
      input[type="text"], input[type="number"], input[type="date"], input[type="search"] {
        background: transparent; color: var(--fg); border: 1px solid var(--fg);
        padding: 8px 10px; border-radius: 6px; outline: none; min-width: 220px;
      }
      label { display: block; margin-bottom: 6px; }
      .field { margin-bottom: 14px; }
      .error { color: #ffdddd; font-size: 0.9rem; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { border-bottom: 1px solid rgba(255,255,255,0.25); padding: 10px; text-align: left; }
      th { font-weight: 700; }
      .actions { display: flex; gap: 8px; }
      .muted { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
