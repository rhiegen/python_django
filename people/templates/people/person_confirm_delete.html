{% extends "people/base.html" %}
{% block content %}
<h1>Delete Person</h1>
<p>Are you sure you want to delete <strong>{{ person.name }}</strong> (ID {{ person.id }})?</p>
<form method="post">
  {% csrf_token %}
  <div class="actions">
    <input type="submit" value="Confirm Delete" />
    <a class="button" href="{% url 'person_list' %}">Cancel</a>
  </div>
</form>
{% endblock %}
