{% extends "people/base.html" %}
{% block content %}
<h1>{{ action }} Person</h1>
<form method="post">
  {% csrf_token %}
  <div class="field">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ values.name|default:'' }}" maxlength="40" required />
    {% if errors.name %}<div class="error">{{ errors.name }}</div>{% endif %}
  </div>
  <div class="field">
    <label for="age">Age</label>
    <input type="number" id="age" name="age" value="{{ values.age|default:'' }}" min="0" required />
    {% if errors.age %}<div class="error">{{ errors.age }}</div>{% endif %}
  </div>
  <div class="field">
    <label for="date_of_birth">Date of Birth</label>
    <input type="text" id="date_of_birth" name="date_of_birth" value="{{ values.date_of_birth|default:'' }}" placeholder="dd/mm/yyyy" required />
    {% if errors.date_of_birth %}<div class="error">{{ errors.date_of_birth }}</div>{% endif %}
  </div>
  <div class="actions">
    <input type="submit" value="{{ action }}" />
    <a class="button" href="{% url 'person_list' %}">Cancel</a>
  </div>
</form>
{% endblock %}
